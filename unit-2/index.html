<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tiếng Anh Thật Vui</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f9ff;
            touch-action: manipulation;
        }
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .confetti {
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
        .image-container img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="app" class="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden p-6 md:p-8">
        <!-- Màn hình bắt đầu -->
        <div id="start-screen" class="text-center py-10">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-6">Học Tiếng Anh Thật Vui! 🌟</h1>
            <p class="text-gray-600 mb-8">Sắp xếp các chữ cái và từ ngữ để hoàn thành bài tập nhé.</p>
            <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 text-white text-2xl font-bold py-4 px-10 rounded-full transition-all transform hover:scale-105 shadow-lg">
                BẮT ĐẦU
            </button>
        </div>

        <!-- Màn hình chơi game -->
        <div id="game-container" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <div class="text-blue-500 font-bold">Câu hỏi: <span id="current-index">1</span>/<span id="total-questions">0</span></div>
                <div class="flex gap-4">
                    <span class="text-green-500 font-bold">✅ <span id="correct-count">0</span></span>
                    <span class="text-red-500 font-bold">❌ <span id="wrong-count">0</span></span>
                </div>
            </div>

            <div class="w-full bg-gray-200 rounded-full h-3 mb-8">
                <div id="progress-bar" class="bg-blue-500 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>

            <div class="flex flex-col items-center mb-6">
                <div class="image-container bg-gray-50 rounded-2xl border-4 border-blue-100 p-2 w-full flex justify-center items-center overflow-hidden min-h-[200px]">
                    <img id="question-image" src="" alt="Câu hỏi" onerror="handleImageError(this)">
                    <div id="emoji-fallback" class="hidden text-8xl"></div>
                </div>
                <button onclick="speakCurrentQuestion()" class="mt-4 flex items-center gap-2 bg-blue-100 text-blue-600 font-bold py-2 px-6 rounded-full hover:bg-blue-200 transition-colors">
                    <span>🔊 Nghe lại</span>
                </button>
            </div>

            <div id="interaction-area" class="text-center">
                <!-- Đã xóa dòng hướng dẫn hủy bỏ -->
                <div id="answer-slots" class="flex flex-wrap justify-center gap-2 mb-8"></div>
                
                <div id="scrambled-letters" class="flex flex-wrap justify-center gap-2 mb-6 min-h-[50px]"></div>
                
                <div id="feedback-msg" class="h-8 mb-4 font-bold transition-all duration-300"></div>

                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <button id="check-btn" onclick="checkAnswer()" class="bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-3 px-10 rounded-2xl shadow-md transition-all disabled:opacity-50" disabled>
                        KIỂM TRA (Enter)
                    </button>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden bg-green-500 hover:bg-green-600 text-white font-extrabold py-3 px-10 rounded-2xl shadow-md transition-all">
                        TIẾP THEO ➜
                    </button>
                </div>
                
                <div id="hint-area" class="mt-4 text-red-500 font-bold hidden italic text-lg"></div>
            </div>
        </div>

        <!-- Màn hình kết quả -->
        <div id="result-screen" class="hidden text-center py-10">
            <h2 class="text-4xl font-extrabold text-blue-700 mb-6">XUẤT SẮC! 🎉</h2>
            <div class="bg-blue-50 rounded-2xl p-8 mb-8">
                <p class="text-2xl mb-4">Tổng cộng:</p>
                <div class="flex justify-around text-3xl font-bold">
                    <div class="text-green-600">Đúng: <span id="final-correct">0</span></div>
                    <div class="text-red-600">Sai: <span id="final-wrong">0</span></div>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold py-4 px-10 rounded-full transition-all">
                LÀM LẠI
            </button>
        </div>
    </div>

    <script>
        const QUESTIONS = [
            { type: 'vocab', word: 'Happy', emoji: '😊' },
            { type: 'vocab', word: 'Sleepy', emoji: '😴', img: 'https://images.unsplash.com/photo-1511195679361-26797825591b?q=80&w=600&auto=format' },
            { type: 'vocab', word: 'Sad', emoji: '😢', img: 'https://images.unsplash.com/photo-1516589174184-c68526514b4c?q=80&w=600&auto=format' },
            { type: 'vocab', word: 'Angry', emoji: '😡' },
            { type: 'vocab', word: 'Fine', emoji: '👌' },	
            { type: 'vocab', word: 'Sick', emoji: '🤒', img: 'https://thumbs.dreamstime.com/b/sad-cute-kid-girl-lay-bed-sick-177083061.jpg' },
            { type: 'vocab', word: 'Scared', emoji: '😨', img: 'https://img.freepik.com/premium-vector/vector-illustration-cartoon-boy-with-scared-expression-pose_625612-23.jpg?semt=ais_rp_progressive&w=740&q=80' },
            { type: 'sentence', text: 'How are you today?', emoji: '❓', img: 'https://voca-land.sgp1.cdn.digitaloceanspaces.com/43844/1759914955112/c55c6836.jpg' },
            { type: 'sentence', text: 'I’m fine', emoji: '🙂' },
            { type: 'sentence', text: 'What is your teacher’s name?', emoji: '👩‍🏫' },
            { type: 'sentence', text: 'My teacher’s name is Mr. Hung', emoji: '👨‍🏫' },
            { type: 'sentence', text: 'What is your best friend’s name?', emoji: '👫', img: 'https://img.freepik.com/free-vector/two-best-friend-girls-with-besties-lettering_1308-86711.jpg?semt=ais_hybrid&w=740&q=80' },
            { type: 'sentence', text: 'My best friend’s name is Maria.', emoji: '👧', img: 'https://img.freepik.com/free-vector/two-best-friend-girls-with-besties-lettering_1308-86711.jpg?semt=ais_hybrid&w=740&q=80' }
        ];

        const PRAISES = ["Well done!", "Good job!", "Excellent!", "Very good!"];
        let currentPool = [];
        let currentIndex = 0;
        let stats = { correct: 0, wrong: 0, attempts: 0 };
        let currentAnswer = []; 

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playBeep(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.7;
            utterance.pitch = 1.3;
            window.speechSynthesis.speak(utterance);
        }

        function handleImageError(img) {
            img.style.display = 'none';
            const fallback = document.getElementById('emoji-fallback');
            fallback.classList.remove('hidden');
            fallback.innerText = QUESTIONS[currentPool[currentIndex]].emoji;
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            currentPool = Array.from(QUESTIONS.keys());
            shuffle(currentPool);
            currentIndex = 0;
            stats = { correct: 0, wrong: 0 };
            updateStatsUI();
            loadQuestion();
        }

        function loadQuestion() {
            const q = QUESTIONS[currentPool[currentIndex]];
            stats.attempts = 0;
            currentAnswer = [];
            
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('total-questions').innerText = currentPool.length;
            document.getElementById('progress-bar').style.width = `${(currentIndex / currentPool.length) * 100}%`;
            
            document.getElementById('question-image').style.display = 'block';
            document.getElementById('question-image').src = q.img;
            document.getElementById('emoji-fallback').classList.add('hidden');
            document.getElementById('feedback-msg').innerText = '';
            document.getElementById('hint-area').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('check-btn').classList.remove('hidden');
            document.getElementById('check-btn').disabled = true;
            
            const scrambledArea = document.getElementById('scrambled-letters');
            scrambledArea.innerHTML = '';

            let items = q.type === 'vocab' ? q.word.split('') : q.text.replace(/[?.,]/g, '').split(' ');
            const shuffledItems = shuffle(items.map((val, idx) => ({ val, id: idx })));
            
            shuffledItems.forEach((item) => {
                const btn = document.createElement('button');
                btn.innerText = item.val;
                btn.id = `scramble-${item.id}`;
                btn.className = "bg-white border-2 border-blue-400 hover:bg-blue-50 text-blue-700 font-bold px-4 py-2 rounded-xl transition-all shadow-sm active:scale-95 text-lg min-w-[45px]";
                btn.onclick = () => addToAnswer(item.val, item.id);
                scrambledArea.appendChild(btn);
            });

            renderSlots();
            setTimeout(() => speakCurrentQuestion(), 500);
        }

        function renderSlots() {
            const q = QUESTIONS[currentPool[currentIndex]];
            const slotArea = document.getElementById('answer-slots');
            slotArea.innerHTML = '';

            const totalItems = q.type === 'vocab' ? q.word.length : q.text.replace(/[?.,]/g, '').split(' ').length;

            for (let i = 0; i < totalItems; i++) {
                const slot = document.createElement('div');
                const isSentence = q.type === 'sentence';
                slot.className = isSentence 
                    ? "min-w-[60px] h-12 border-b-4 border-gray-300 flex items-center justify-center text-lg font-bold text-blue-600 px-2 cursor-pointer hover:bg-blue-50 transition-all"
                    : "w-12 h-12 border-b-4 border-gray-300 flex items-center justify-center text-xl font-bold text-blue-600 uppercase cursor-pointer hover:bg-blue-50 transition-all";
                
                if (currentAnswer[i]) {
                    slot.innerText = currentAnswer[i].val;
                    slot.classList.replace('border-gray-300', 'border-blue-500');
                    slot.onclick = () => removeFromAnswer(i);
                }
                
                slotArea.appendChild(slot);
            }

            document.getElementById('check-btn').disabled = currentAnswer.length < totalItems;
        }

        function addToAnswer(val, originalId) {
            const q = QUESTIONS[currentPool[currentIndex]];
            const limit = q.type === 'vocab' ? q.word.length : q.text.replace(/[?.,]/g, '').split(' ').length;
            
            if (currentAnswer.length < limit) {
                currentAnswer.push({ val, id: originalId });
                document.getElementById(`scramble-${originalId}`).style.visibility = 'hidden';
                renderSlots();
            }
        }

        function removeFromAnswer(index) {
            if (document.getElementById('check-btn').classList.contains('hidden')) return;

            const item = currentAnswer.splice(index, 1)[0];
            document.getElementById(`scramble-${item.id}`).style.visibility = 'visible';
            renderSlots();
        }

        function resetCurrentAnswer() {
            currentAnswer.forEach(item => {
                const btn = document.getElementById(`scramble-${item.id}`);
                if (btn) btn.style.visibility = 'visible';
            });
            currentAnswer = [];
            renderSlots();
        }

        function checkAnswer() {
            const q = QUESTIONS[currentPool[currentIndex]];
            const target = q.type === 'vocab' ? q.word.toLowerCase() : q.text.replace(/[?.,]/g, '').toLowerCase();
            const user = currentAnswer.map(i => i.val).join(q.type === 'vocab' ? '' : ' ').toLowerCase();

            if (user === target) {
                handleSuccess();
            } else {
                handleFailure();
            }
        }

        function handleSuccess() {
            stats.correct++;
            updateStatsUI();
            playBeep('correct');
            
            const praise = PRAISES[Math.floor(Math.random() * PRAISES.length)];
            const feedback = document.getElementById('feedback-msg');
            feedback.innerText = praise + " 🎉";
            feedback.className = "h-8 mb-4 font-bold text-green-500 text-2xl confetti";
            
            document.getElementById('check-btn').classList.add('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
            
            document.querySelectorAll('#answer-slots > div').forEach(s => {
                s.classList.add('text-green-600', 'border-green-500');
                s.onclick = null;
            });

            speak(praise);
        }

        function handleFailure() {
            stats.attempts++;
            playBeep('wrong');
            
            const feedback = document.getElementById('feedback-msg');
            feedback.innerText = "Sai rồi, thử lại nhé! ❌";
            feedback.className = "h-8 mb-4 font-bold text-red-500 text-2xl shake";
            
            setTimeout(() => {
                feedback.classList.remove('shake');
                if (stats.attempts < 3) {
                    resetCurrentAnswer();
                }
            }, 800);

            if (stats.attempts >= 3) {
                stats.wrong++;
                updateStatsUI();
                const hint = document.getElementById('hint-area');
                hint.innerText = `Đáp án là: ${QUESTIONS[currentPool[currentIndex]].type === 'vocab' ? QUESTIONS[currentPool[currentIndex]].word : QUESTIONS[currentPool[currentIndex]].text}`;
                hint.classList.remove('hidden');
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            }
        }

        function updateStatsUI() {
            document.getElementById('correct-count').innerText = stats.correct;
            document.getElementById('wrong-count').innerText = stats.wrong;
        }

        function speakCurrentQuestion() {
            const q = QUESTIONS[currentPool[currentIndex]];
            speak(q.type === 'vocab' ? q.word : q.text);
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentPool.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-correct').innerText = stats.correct;
            document.getElementById('final-wrong').innerText = stats.wrong;
            speak("Well done! You have finished the exercise.");
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const nextBtn = document.getElementById('next-btn');
                const checkBtn = document.getElementById('check-btn');
                if (!nextBtn.classList.contains('hidden')) nextQuestion();
                else if (!checkBtn.disabled && !checkBtn.classList.contains('hidden')) checkAnswer();
            } else if (e.key === 'Backspace') {
                if (currentAnswer.length > 0) removeFromAnswer(currentAnswer.length - 1);
            }
        });
    </script>
</body>
</html>
