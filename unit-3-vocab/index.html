<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids English Vocabulary Fun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
        }

        .kids-title {
            font-family: 'Fredoka One', cursive;
            color: #ff6b6b;
            text-shadow: 2px 2px #feca57;
        }

        .quiz-container {
            max-width: 600px;
            margin: 2rem auto;
            background: white;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 8px solid #4ecdc4;
        }

        .image-box {
            width: 100%;
            height: 300px;
            background-color: #f7f9fc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .image-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .emoji-fallback {
            font-size: 100px;
            display: none;
        }

        .input-field {
            border: 4px solid #4ecdc4;
            border-radius: 15px;
            font-size: 2rem;
            text-align: center;
            letter-spacing: 5px;
            font-weight: bold;
            color: #2f3542;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255,107,107,0.3);
        }

        .btn {
            transition: transform 0.1s;
            cursor: pointer;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .feedback-pop {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .stats-card {
            background: #ffeaa7;
            border: 3px dashed #fdcb6e;
        }
    </style>
</head>
<body class="p-4">

    <div id="start-screen" class="quiz-container p-8 text-center">
        <h1 class="kids-title text-4xl mb-6">Word Challenge!</h1>
        <p class="text-gray-600 mb-8 text-lg">Learn new words with pictures and fun sounds.</p>
        <button onclick="startQuiz()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-10 rounded-full text-2xl shadow-lg btn">
            START NOW!
        </button>
    </div>

    <div id="quiz-screen" class="quiz-container hidden relative">
        <!-- Progress bar -->
        <div class="w-full bg-gray-200 h-4">
            <div id="progress-bar" class="bg-yellow-400 h-4 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Image Container -->
        <div class="image-box p-4">
            <img id="word-image" src="" alt="Vocabulary Image" onerror="showEmoji()">
            <div id="emoji-display" class="emoji-fallback"></div>
        </div>

        <div class="p-8 text-center">
            <!-- Hint Display -->
            <div id="word-hint" class="text-3xl font-bold text-blue-600 mb-6 tracking-widest">A _ _ _ _</div>
            
            <!-- Input -->
            <input type="text" id="answer-input" placeholder="..." 
                   class="input-field w-full mb-6 p-4 uppercase" autocomplete="off">

            <!-- Controls -->
            <div class="flex justify-center gap-4 mb-6">
                <button onclick="speakWord()" class="bg-blue-400 text-white p-4 rounded-full shadow hover:bg-blue-500 btn flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
                    </svg>
                </button>
                <button id="check-btn" onclick="checkAnswer()" class="bg-green-500 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow hover:bg-green-600 btn">
                    CHECK
                </button>
                <button id="next-btn" onclick="nextQuestion()" class="hidden bg-orange-500 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow hover:bg-orange-600 btn">
                    NEXT ➜
                </button>
            </div>

            <!-- Messages -->
            <div id="feedback-msg" class="h-12 flex items-center justify-center text-2xl font-bold"></div>
        </div>
    </div>

    <div id="result-screen" class="quiz-container p-8 text-center hidden">
        <h1 class="kids-title text-4xl mb-6">Excellent!</h1>
        <div class="stats-card p-6 rounded-2xl mb-8">
            <p class="text-2xl mb-2">Quiz Completed!</p>
            <div class="flex justify-around mt-4">
                <div>
                    <span class="block text-4xl font-bold text-green-600" id="total-correct">0</span>
                    <span class="text-gray-600">Correct</span>
                </div>
                <div>
                    <span class="block text-4xl font-bold text-red-600" id="total-wrong">0</span>
                    <span class="text-gray-600">Wrong</span>
                </div>
            </div>
        </div>
        <button onclick="location.reload()" class="bg-purple-500 text-white font-bold py-4 px-10 rounded-full text-2xl shadow-lg btn">
            PLAY AGAIN
        </button>
    </div>

    <script>
        const VOCAB_LIST = [
            { word: "Red", emoji: "🔴" },
            { word: "Yellow", emoji: "🟡" },
            { word: "Blue", emoji: "🔵" },
            { word: "Green", emoji: "🟢" },
            { word: "Black", emoji: "⚫" },
            { word: "Purple", emoji: "🟣" },
            { word: "Strawberry", emoji: "🍓", img: "https://images.unsplash.com/photo-1464960350423-9f85483def9a?w=500&q=80" },
            { word: "Cherry", emoji: "🍒", img: "https://images.unsplash.com/photo-1528821128474-27fcafee357e?w=500&q=80" },
            { word: "Banana", emoji: "🍌", img: "https://images.unsplash.com/photo-1571771894821-ad9902d1394e?w=500&q=80" },
            { word: "Bag", emoji: "🎒", img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500&q=80" },
            { word: "Book", emoji: "📖", img: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=500&q=80" },
            { word: "Pink", emoji: "🩷" },
            { word: "Apple", emoji: "🍎", img: "https://images.unsplash.com/photo-1560806887-1e470b8655e8?w=500&q=80" },
            { word: "Ruler", emoji: "📏", img: "https://images.unsplash.com/photo-1586075010633-2470fd912444?w=500&q=80" }
        ];

        const PRAISE_LIST = ["Well done!", "Good job!", "Excellent!", "Very good!"];
        const VOICES = {
            Kore: "Kore", // Default choice
            Despina: "Despina"
        };

        let currentQuestions = [];
        let currentIndex = 0;
        let wrongCount = 0;
        let totalStats = { correct: 0, wrong: 0 };
        let quizActive = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            currentQuestions = shuffle([...VOCAB_LIST]);
            currentIndex = 0;
            totalStats = { correct: 0, wrong: 0 };
            quizActive = true;
            loadQuestion();
        }

        function loadQuestion() {
            const currentItem = currentQuestions[currentIndex];
            const imgEl = document.getElementById('word-image');
            const emojiEl = document.getElementById('emoji-display');
            const inputEl = document.getElementById('answer-input');
            const hintEl = document.getElementById('word-hint');
            const feedbackEl = document.getElementById('feedback-msg');
            const progress = ((currentIndex) / currentQuestions.length) * 100;

            // Reset UI
            wrongCount = 0;
            imgEl.src = currentItem.img;
            imgEl.style.display = 'block';
            emojiEl.style.display = 'none';
            emojiEl.innerText = currentItem.emoji;
            
            inputEl.value = "";
            inputEl.disabled = false;
            document.getElementById('check-btn').classList.remove('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            feedbackEl.innerText = "";
            feedbackEl.className = "h-12 flex items-center justify-center text-2xl font-bold";
            
            // Build hint: Word[0] + underscores for the rest
            const word = currentItem.word;
            let hint = word.charAt(0).toUpperCase() + " ";
            for (let i = 1; i < word.length; i++) {
                hint += "_ ";
            }
            hintEl.innerText = hint.trim();
            
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            // Speak automatically
            setTimeout(() => speakWord(), 500);
            inputEl.focus();
        }

        function showEmoji() {
            document.getElementById('word-image').style.display = 'none';
            document.getElementById('emoji-display').style.display = 'block';
        }

        async function speakWord(isPraise = false, textToSpeak = "") {
            const currentItem = currentQuestions[currentIndex];
            const text = textToSpeak || currentItem.word;
            
            // Note: In local development this may fail if API key not present, 
            // but is designed for the specified environment.
            // Using standard Web Speech API as a robust fallback for child-like voice
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.7; // Slow
                utterance.pitch = 1.3; // Higher pitch for child-like feel
                
                // Try to find a female voice
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Google US English') || v.name.includes('Zira'));
                if (femaleVoice) utterance.voice = femaleVoice;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        function checkAnswer() {
            if (!quizActive) return;
            
            const inputEl = document.getElementById('answer-input');
            const userAnswer = inputEl.value.trim().toLowerCase();
            const correctAnswer = currentQuestions[currentIndex].word.toLowerCase();
            const feedbackEl = document.getElementById('feedback-msg');

            if (userAnswer === correctAnswer) {
                // CORRECT
                totalStats.correct++;
                const praise = PRAISE_LIST[Math.floor(Math.random() * PRAISE_LIST.length)];
                feedbackEl.innerText = praise;
                feedbackEl.className = "h-12 flex items-center justify-center text-2xl font-bold text-green-500 feedback-pop";
                
                inputEl.disabled = true;
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                
                speakWord(true, praise);
            } else {
                // WRONG
                wrongCount++;
                totalStats.wrong++;
                
                feedbackEl.innerText = "Try again!";
                feedbackEl.className = "h-12 flex items-center justify-center text-2xl font-bold text-red-500 feedback-pop";
                
                // Play error sound (using beep as fallback)
                playTone(200, 300);

                if (wrongCount >= 3) {
                    feedbackEl.innerHTML = `The word is: <span class="text-blue-600">${currentQuestions[currentIndex].word}</span>`;
                    inputEl.disabled = true;
                    document.getElementById('check-btn').classList.add('hidden');
                    document.getElementById('next-btn').classList.remove('hidden');
                } else {
                    inputEl.value = "";
                    inputEl.focus();
                    setTimeout(() => { feedbackEl.innerText = ""; }, 1500);
                }
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= currentQuestions.length) {
                showResults();
            } else {
                loadQuestion();
            }
        }

        function showResults() {
            quizActive = false;
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('total-correct').innerText = totalStats.correct;
            document.getElementById('total-wrong').innerText = totalStats.wrong;
            
            const finalPraise = totalStats.correct > totalStats.wrong ? "You are amazing!" : "Keep practicing!";
            speakWord(true, finalPraise);
        }

        // Simple audio feedback without external files
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration/1000);
            osc.start();
            osc.stop(audioCtx.currentTime + duration/1000);
        }

        // Keyboard Enter support
        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!document.getElementById('check-btn').classList.contains('hidden')) {
                    checkAnswer();
                } else if (!document.getElementById('next-btn').classList.contains('hidden')) {
                    nextQuestion();
                }
            }
        });

        // Initialize voices on load
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
